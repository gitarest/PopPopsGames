<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe — Pop Pop's Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game">
    <h1>Tic-Tac-Toe</h1>

    <!-- Session scoreboard: Player (X) vs Computer (O). -->
    <div id="score" class="score" aria-label="Score">
      <div class="score-side">
        <button id="name-btn" class="score-label name-btn"
                title="Tap to set your name (blank = guest)">Guest</button>
        <input id="name-input" class="name-input" type="text"
               maxlength="20" placeholder="name…" autocomplete="off" hidden>
        <ul id="name-list" class="name-list" hidden></ul>
        <span id="score-player" class="score-num">0</span>
      </div>
      <span class="score-vs">vs</span>
      <div class="score-side">
        <span class="score-label">Computer</span>
        <span id="score-hangman" class="score-num">0</span>
      </div>
    </div>

    <p id="status" class="status">&nbsp;</p>

    <!-- 3×3 board — cells are built by script.js -->
    <div id="board" class="ttt-board" role="grid" aria-label="Tic-tac-toe board"></div>

    <button id="new-game" class="new-game">New Game</button>

    <a href="/" class="home-btn">
      <img src="/logo.png" alt="Pop Pop's Games">
    </a>
  </main>

  <script src="script.js"></script>
</body>
</html>
