<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors — Pop Pop's Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game">
    <h1>Rock Paper Scissors</h1>

    <div id="score" class="score" aria-label="Score">
      <div class="score-side">
        <button id="name-btn" class="score-label name-btn"
                title="Tap to set your name (blank = guest)">Guest</button>
        <input id="name-input" class="name-input" type="text"
               maxlength="20" placeholder="name…" autocomplete="off" hidden>
        <ul id="name-list" class="name-list" hidden></ul>
        <span id="score-player" class="score-num">0</span>
      </div>
      <span class="score-vs">vs</span>
      <div class="score-side">
        <span class="score-label">Computer</span>
        <span id="score-hangman" class="score-num">0</span>
      </div>
    </div>

    <!-- Cycling countdown shown while waiting for the player's pick -->
    <div id="countdown" class="countdown">
      <span id="countdown-word" class="countdown-word">Rock</span>
    </div>

    <!-- Result shown after the player picks -->
    <div id="result-area" class="result-area" hidden>
      <div class="showdown">
        <div class="showdown-side">
          <div id="player-emoji" class="showdown-emoji"></div>
          <span class="showdown-label">You</span>
        </div>
        <div class="showdown-vs">VS</div>
        <div class="showdown-side">
          <div id="computer-emoji" class="showdown-emoji"></div>
          <span class="showdown-label">Computer</span>
        </div>
      </div>
      <p id="result-text" class="result-text"></p>
    </div>

    <!-- Large choice buttons — always visible, disabled after pick -->
    <div class="choices">
      <button class="choice-btn" data-choice="rock" aria-label="Rock">
        <span class="btn-emoji">✊</span>
        <span class="btn-label">Rock</span>
      </button>
      <button class="choice-btn" data-choice="paper" aria-label="Paper">
        <span class="btn-emoji">✋</span>
        <span class="btn-label">Paper</span>
      </button>
      <button class="choice-btn" data-choice="scissors" aria-label="Scissors">
        <span class="btn-emoji">✌️</span>
        <span class="btn-label">Scissors</span>
      </button>
    </div>

    <button id="new-game" class="new-game">New Game</button>

    <a href="/" class="home-btn">
      <img src="/logo.png" alt="Pop Pop's Games">
    </a>
  </main>

  <script src="script.js"></script>
</body>
</html>
